# Production-style stack: Nginx (TLS) + Flask (lab) + Django (optional /d) + Postgres + Redis
# See deploy/README.md and .env.example

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-lab}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB} || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [internal]
    restart: unless-stopped
    # No host ports; internal only

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [internal]
    restart: unless-stopped

  flask:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      # Optional: wire Redis in app later; harmless if unused
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      PORT: "5000"
    volumes:
      - flask_data:/app/data
      - ./keys_only:/app/keys_only:ro
    depends_on:
      redis: { condition: service_healthy }
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:5000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 50s

  django:
    build:
      context: .
      dockerfile: Dockerfile.django
    env_file: .env
    environment:
      DJANGO_DB_ENGINE: postgres
      DJANGO_DEBUG: "0"
      DJANGO_SETTINGS_MODULE: portal.settings
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ${POSTGRES_DB:-lab}
      POSTGRES_USER: ${POSTGRES_USER:-lab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-change-me}
    depends_on:
      postgres: { condition: service_healthy }
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health/"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  nginx:
    image: nginx:1.25-alpine
    depends_on:
      - flask
      - django
    ports:
      - "80:80"
      - "443:443"
    volumes:
      # Generated by install.sh (or ./deploy/render-nginx.sh) from nginx/default.conf.in
      - ./nginx/resolved:/etc/nginx/conf.d:ro
      - certbot_etc:/etc/letsencrypt:ro
    networks: [internal]
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # One-shot: docker compose run --rm certbot certonly --dns-cloudflare --dns-cloudflare-credentials /run/secrets/cf.ini …
  certbot:
    build:
      context: .
      dockerfile: docker/Dockerfile.certbot
    entrypoint: certbot
    volumes:
      - certbot_etc:/etc/letsencrypt
      - ./secrets:/run/secrets:ro
    networks: [internal]

volumes:
  pgdata:
  redisdata:
  flask_data:
  certbot_etc:

networks:
  internal:
    driver: bridge
