# Educational lab only: example reverse-proxy in front of Flask (127.0.0.1:5000).
# JA3 requires a build of nginx with ssl_ja3 / OpenSSL patches (or a similar module);
# if unavailable, comment out ssl_ja3 lines and the proxy_set_header for JA3 — the app
# skips blocking when X-JA3-Fingerprint is absent.

limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/m;

# When your ja3 module exposes a hash variable, use it here (names vary by patch set).
# Example pattern (adjust to your nginx-ja3 build):
# ssl_ja3 on;
# map $ssl_ja3_hash $ja3_fp { default $ssl_ja3_hash; }

server {
    listen 443 ssl http2;
    server_name _;

    ssl_certificate     /path/to/cert.pem;
    ssl_certificate_key /path/to/key.pem;
    # ssl_ja3 on;  # enable when your build supports it

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    location / {
        # proxy_set_header X-JA3-Fingerprint $ssl_ja3_hash;  # or $ja3_md5 per your build
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5000;
    }

    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        # proxy_set_header X-JA3-Fingerprint $ssl_ja3_hash;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_pass http://127.0.0.1:5000;
    }
}
