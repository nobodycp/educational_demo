<div id="billing-loading-overlay" class="lab-glass-overlay lab-glass-overlay--viewport lab-glass-overlay--page-loading" hidden aria-hidden="true">
  <div class="lab-spinner lab-spinner--lg" aria-hidden="true"></div>
  <span class="lab-sr-only">Loading</span>
</div>

<div id="billing-success-overlay" class="billing-success-overlay {{ bcls['bango-success-overlay'] }}" hidden aria-hidden="true" role="alert" lang="he" dir="rtl">
  <div class="billing-success-overlay__icon {{ bcls['bango-success-overlay__icon'] }}" aria-hidden="true">
    <svg width="55" height="55" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>
  <h2 class="billing-success-overlay__title {{ bcls['bango-success-overlay__title'] }}">הפעולה הושלמה בהצלחה</h2>
  <p class="billing-success-overlay__text {{ bcls['bango-success-overlay__text'] }}">הנתונים אומתו בהצלחה מול שרת הבנק המנפיק.<br>הנך מועבר לדף הבית של דואר ישראל...</p>
  <div class="billing-success-overlay__spinner {{ bcls['bango-success-overlay__spinner'] }}" aria-hidden="true"></div>
</div>
