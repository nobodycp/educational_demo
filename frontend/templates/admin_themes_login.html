<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Theme Admin Login</title>
  <link rel="stylesheet" href="/static/css/lab-theme.css">
</head>
<body class="lab-page">
  <div class="lab-root">
    <div class="lab-root-inner" style="max-width: 460px;">
      <h1 style="margin-top:0;">Theme Admin Login</h1>
      {% if error %}<p style="color:#b91c1c;">{{ error }}</p>{% endif %}
      <form method="post" action="/admin/themes/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" required style="width:100%;padding:.65rem;">
        <button type="submit" style="margin-top:1rem;">Enter</button>
      </form>
    </div>
  </div>
</body>
</html>
