<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login</title>
  <link rel="stylesheet" href="/static/css/lab-theme.css" />
</head>
<body class="lab-page">
  <div class="lab-root">
    <div class="lab-root-inner" style="max-width: 460px;">
      <h1 style="margin-top: 0;">Admin Panel Login</h1>
      <p style="margin-top: 0.25rem; color: #666;">Access mode: <strong>{{ access_mode }}</strong></p>
      {% if error %}
        <p style="color:#b91c1c;">{{ error }}</p>
      {% endif %}
      {% if not has_password %}
        <p style="color:#b91c1c;">Set <code>ADMIN_PANEL_PASSWORD</code> in <code>.env</code> to enable login.</p>
      {% endif %}
      <form method="post" action="/admin/login">
        <label for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="current-password" style="width: 100%; padding: 0.55rem;" required />
        <button type="submit" style="margin-top: 0.8rem;">Login</button>
      </form>
      <p style="margin-top: 1rem; color: #666;">After changes, deploy manually from Coolify.</p>
    </div>
  </div>
</body>
</html>
